name: AssistiveApp
options:
  bundleIdPrefix: com.assistive.system
packages:
  LiteRTLM:
    url: https://github.com/nicklama/litert-lm-swift
    from: "0.1.0"
targets:
  AssistiveApp:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - AssistiveApp
    settings:
      INFOPLIST_FILE: AssistiveApp/Info.plist
      CODE_SIGN_IDENTITY: "-"
      CODE_SIGNING_REQUIRED: "NO"
      AD_HOC_CODE_SIGNING_ALLOWED: "YES"
    dependencies:
      - sdk: AVFoundation.framework
      - sdk: AudioToolbox.framework
      - sdk: CoreHaptics.framework
      - sdk: Vision.framework
      - package: LiteRTLM
