name: AssistiveApp
options:
  bundleIdPrefix: com.assistive.system
packages:
  LiteRTLM:
    url: https://github.com/google-ai-edge/LiteRT-LM
    revision: a0afb5a56acd106b23a2b2385b8469834dc268c0
targets:
  AssistiveApp:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - AssistiveApp
    entitlements:
      path: AssistiveApp/AssistiveApp.entitlements
    settings:
      INFOPLIST_FILE: AssistiveApp/Info.plist
      CODE_SIGN_IDENTITY: "-"
      CODE_SIGNING_REQUIRED: "NO"
      AD_HOC_CODE_SIGNING_ALLOWED: "YES"
    dependencies:
      - sdk: AVFoundation.framework
      - sdk: AudioToolbox.framework
      - sdk: CoreHaptics.framework
      - sdk: Vision.framework
      - package: LiteRTLM
