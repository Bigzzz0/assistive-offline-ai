name: AssistiveApp
options:
  bundleIdPrefix: com.assistive.system
targets:
  AssistiveApp:
    type: application
    platform: iOS
    deploymentTarget: "15.0"
    sources:
      - AssistiveApp
    settings:
      INFOPLIST_FILE: AssistiveApp/Info.plist
      CODE_SIGN_IDENTITY: "-"
      CODE_SIGNING_REQUIRED: "NO"
      AD_HOC_CODE_SIGNING_ALLOWED: "YES"
    dependencies:
      - sdk: AVFoundation.framework
      - sdk: AudioToolbox.framework
      - sdk: CoreHaptics.framework
